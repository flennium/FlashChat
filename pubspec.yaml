name: flashchat
description: A Firebase chatting app.
publish_to: "none"
version: 0.1.8+9
environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_analytics: ^11.3.6
  firebase_auth: ^5.3.1
  firebase_core: ^3.8.0
  firebase_crashlytics: ^4.1.3
  firebase_database: ^11.2.0
  firebase_messaging: ^15.1.5
  firebase_remote_config: ^5.1.4
  cloud_firestore: ^5.5.0
  flutter_riverpod: ^2.6.1
  google_fonts: ^6.2.1
  google_sign_in: ^6.2.2
  image_picker: ^1.1.2
  intl: ^0.19.0
  package_info_plus: ^8.1.0
  shared_preferences: ^2.5.3
  supabase_flutter: ^2.10.3
  uuid: ^4.5.1
  simple_icons: ^14.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
