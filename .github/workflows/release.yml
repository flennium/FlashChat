name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restore Firebase config files
        env:
          FIREBASE_OPTIONS_DART: ${{ secrets.FIREBASE_OPTIONS_DART }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$FIREBASE_OPTIONS_DART" ]; then
            echo "Missing FIREBASE_OPTIONS_DART secret"
            exit 1
          fi
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "Missing GOOGLE_SERVICES_JSON secret"
            exit 1
          fi

          mkdir -p lib android/app
          printf '%s' "$FIREBASE_OPTIONS_DART" > lib/firebase_options.dart
          printf '%s' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json

      - name: Install dependencies
        run: flutter pub get

      - name: Validate Android release signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=0
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "Missing $name secret"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Restore Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release-keystore.jks

      - name: Read and validate version
        id: app_version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          VERSION_NAME=${VERSION%%+*}
          TAG_NAME="${GITHUB_REF_NAME:-v$VERSION_NAME}"
          if [ -n "$GITHUB_REF_NAME" ] && [ "v$VERSION_NAME" != "$TAG_NAME" ]; then
            echo "Tag $TAG_NAME does not match pubspec version v$VERSION_NAME"
            exit 1
          fi
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Build Android release APK
        env:
          REQUIRE_RELEASE_SIGNING: "true"
          ANDROID_KEYSTORE_PATH: android/app/release-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: >
          flutter build apk --release
          --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          --dart-define=SUPABASE_AVATAR_BUCKET=${{ secrets.SUPABASE_AVATAR_BUCKET }}
          --dart-define=SUPABASE_CHAT_IMAGE_BUCKET=${{ secrets.SUPABASE_CHAT_IMAGE_BUCKET }}
          --dart-define=GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}

      - name: Prepare Android release asset
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
            flashchat-${{ steps.app_version.outputs.version_name }}-android-release.apk

      - name: Upload Android release artifact
        uses: actions/upload-artifact@v4
        with:
          name: flashchat-${{ steps.app_version.outputs.version_name }}-android-release
          path: flashchat-${{ steps.app_version.outputs.version_name }}-android-release.apk
          if-no-files-found: error

  build-windows-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restore Firebase options file
        shell: pwsh
        env:
          FIREBASE_OPTIONS_DART: ${{ secrets.FIREBASE_OPTIONS_DART }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:FIREBASE_OPTIONS_DART)) {
            Write-Error "Missing FIREBASE_OPTIONS_DART secret"
            exit 1
          }
          New-Item -ItemType Directory -Force -Path lib | Out-Null
          Set-Content -Path lib/firebase_options.dart -Value $env:FIREBASE_OPTIONS_DART -NoNewline

      - name: Install dependencies
        run: flutter pub get

      - name: Read and validate version
        id: app_version
        shell: pwsh
        run: |
          $versionLine = Select-String -Path pubspec.yaml -Pattern '^version:'
          $version = ($versionLine.Line -split '\s+')[1]
          $versionName = $version.Split('+')[0]
          $tagName = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { "v$versionName" }
          if ($env:GITHUB_REF_NAME -and ("v$versionName" -ne $tagName)) {
            Write-Error "Tag $tagName does not match pubspec version v$versionName"
            exit 1
          }
          "version_name=$versionName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag_name=$tagName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build Windows release bundle
        run: >
          flutter build windows --release
          --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          --dart-define=SUPABASE_AVATAR_BUCKET=${{ secrets.SUPABASE_AVATAR_BUCKET }}
          --dart-define=SUPABASE_CHAT_IMAGE_BUCKET=${{ secrets.SUPABASE_CHAT_IMAGE_BUCKET }}
          --dart-define=GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}

      - name: Build Windows installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.5
        with:
          path: .github/windows/FlashChat.iss
          options: >-
            /DMyAppVersion=${{ steps.app_version.outputs.version_name }}
            /DMyAppSourceDir=..\..\build\windows\x64\runner\Release
            /DMyOutputDir=..\..\
            /DMyOutputBaseFilename=flashchat-${{ steps.app_version.outputs.version_name }}-windows-setup

      - name: Package portable Windows bundle
        shell: pwsh
        run: |
          $zipPath = "flashchat-$env:VERSION_NAME-windows.zip"
          Compress-Archive `
            -Path build/windows/x64/runner/Release/* `
            -DestinationPath $zipPath `
            -Force
        env:
          VERSION_NAME: ${{ steps.app_version.outputs.version_name }}

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: flashchat-${{ steps.app_version.outputs.version_name }}-windows-installer
          path: flashchat-${{ steps.app_version.outputs.version_name }}-windows-setup.exe
          if-no-files-found: error

      - name: Upload Windows portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: flashchat-${{ steps.app_version.outputs.version_name }}-windows-portable
          path: flashchat-${{ steps.app_version.outputs.version_name }}-windows.zip
          if-no-files-found: error

  publish-release:
    needs:
      - build-android-release
      - build-windows-release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read and validate version
        id: app_version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          VERSION_NAME=${VERSION%%+*}
          TAG_NAME="${GITHUB_REF_NAME:-v$VERSION_NAME}"
          if [ -n "$GITHUB_REF_NAME" ] && [ "v$VERSION_NAME" != "$TAG_NAME" ]; then
            echo "Tag $TAG_NAME does not match pubspec version v$VERSION_NAME"
            exit 1
          fi
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Download Android release artifact
        uses: actions/download-artifact@v4
        with:
          name: flashchat-${{ steps.app_version.outputs.version_name }}-android-release
          path: release-assets

      - name: Download Windows installer artifact
        uses: actions/download-artifact@v4
        with:
          name: flashchat-${{ steps.app_version.outputs.version_name }}-windows-installer
          path: release-assets

      - name: Download Windows portable artifact
        uses: actions/download-artifact@v4
        with:
          name: flashchat-${{ steps.app_version.outputs.version_name }}-windows-portable
          path: release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.app_version.outputs.tag_name }}
          name: FlashChat ${{ steps.app_version.outputs.tag_name }}
          generate_release_notes: true
          files: |
            release-assets/flashchat-${{ steps.app_version.outputs.version_name }}-android-release.apk
            release-assets/flashchat-${{ steps.app_version.outputs.version_name }}-windows-setup.exe
            release-assets/flashchat-${{ steps.app_version.outputs.version_name }}-windows.zip
