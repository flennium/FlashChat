name: Version Tag And Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump-version-and-tag:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      version_name: ${{ steps.bump.outputs.version_name }}
      tag_name: ${{ steps.bump.outputs.tag_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump pubspec version
        id: bump
        shell: bash
        run: |
          python <<'PY'
          import re
          from pathlib import Path

          path = Path("pubspec.yaml")
          text = path.read_text(encoding="utf-8")
          match = re.search(r"^version:\s*([0-9]+)\.([0-9]+)\.([0-9]+)\+([0-9]+)\s*$", text, re.MULTILINE)
          if not match:
              raise SystemExit("Could not parse pubspec version")

          major, minor, patch, build = map(int, match.groups())
          patch += 1
          build += 1
          new_version = f"{major}.{minor}.{patch}+{build}"
          new_text = re.sub(
              r"^version:\s*[0-9]+\.[0-9]+\.[0-9]+\+[0-9]+\s*$",
              f"version: {new_version}",
              text,
              count=1,
              flags=re.MULTILINE,
          )
          path.write_text(new_text, encoding="utf-8")
          print(new_version)
          PY
          NEW_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          VERSION_NAME=${NEW_VERSION%%+*}
          TAG_NAME="v$VERSION_NAME"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        shell: bash
        run: |
          git add pubspec.yaml
          git commit -m "chore(release): bump version to ${{ steps.bump.outputs.new_version }}"

      - name: Create tag
        run: git tag -a "${{ steps.bump.outputs.tag_name }}" -m "Release ${{ steps.bump.outputs.tag_name }}"

      - name: Push commit and tag
        run: git push origin HEAD:main --follow-tags

  build-android-release:
    needs: bump-version-and-tag
    runs-on: ubuntu-latest
    env:
      HAS_ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}

    steps:
      - name: Check out tagged version
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version-and-tag.outputs.tag_name }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restore Firebase config files
        env:
          FIREBASE_OPTIONS_DART: ${{ secrets.FIREBASE_OPTIONS_DART }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$FIREBASE_OPTIONS_DART" ]; then
            echo "Missing FIREBASE_OPTIONS_DART secret"
            exit 1
          fi
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "Missing GOOGLE_SERVICES_JSON secret"
            exit 1
          fi

          mkdir -p lib android/app
          printf '%s' "$FIREBASE_OPTIONS_DART" > lib/firebase_options.dart
          printf '%s' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json

      - name: Install dependencies
        run: flutter pub get

      - name: Restore Android keystore
        if: env.HAS_ANDROID_KEYSTORE == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release-keystore.jks

      - name: Build Android release APK
        env:
          ANDROID_KEYSTORE_PATH: android/app/release-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: >
          flutter build apk --release
          --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          --dart-define=SUPABASE_AVATAR_BUCKET=${{ secrets.SUPABASE_AVATAR_BUCKET }}
          --dart-define=SUPABASE_CHAT_IMAGE_BUCKET=${{ secrets.SUPABASE_CHAT_IMAGE_BUCKET }}
          --dart-define=GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}

      - name: Prepare Android release asset
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
            flashchat-${{ needs.bump-version-and-tag.outputs.version_name }}-android-release.apk

      - name: Upload Android release artifact
        uses: actions/upload-artifact@v4
        with:
          name: flashchat-${{ needs.bump-version-and-tag.outputs.version_name }}-android-release
          path: flashchat-${{ needs.bump-version-and-tag.outputs.version_name }}-android-release.apk
          if-no-files-found: error

  build-windows-release:
    needs: bump-version-and-tag
    runs-on: windows-latest

    steps:
      - name: Check out tagged version
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version-and-tag.outputs.tag_name }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restore Firebase options file
        shell: pwsh
        env:
          FIREBASE_OPTIONS_DART: ${{ secrets.FIREBASE_OPTIONS_DART }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:FIREBASE_OPTIONS_DART)) {
            Write-Error "Missing FIREBASE_OPTIONS_DART secret"
            exit 1
          }
          New-Item -ItemType Directory -Force -Path lib | Out-Null
          Set-Content -Path lib/firebase_options.dart -Value $env:FIREBASE_OPTIONS_DART -NoNewline

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release bundle
        run: >
          flutter build windows --release
          --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          --dart-define=SUPABASE_AVATAR_BUCKET=${{ secrets.SUPABASE_AVATAR_BUCKET }}
          --dart-define=SUPABASE_CHAT_IMAGE_BUCKET=${{ secrets.SUPABASE_CHAT_IMAGE_BUCKET }}
          --dart-define=GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}

      - name: Build Windows installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.5
        with:
          path: .github/windows/FlashChat.iss
          options: >-
            /DMyAppVersion=${{ needs.bump-version-and-tag.outputs.version_name }}
            /DMyAppSourceDir=..\..\build\windows\x64\runner\Release
            /DMyOutputDir=..\..\
            /DMyOutputBaseFilename=flashchat-${{ needs.bump-version-and-tag.outputs.version_name }}-windows-setup

      - name: Package portable Windows bundle
        shell: pwsh
        run: |
          $zipPath = "flashchat-${{ needs.bump-version-and-tag.outputs.version_name }}-windows.zip"
          Compress-Archive `
            -Path build/windows/x64/runner/Release/* `
            -DestinationPath $zipPath `
            -Force

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: flashchat-${{ needs.bump-version-and-tag.outputs.version_name }}-windows-installer
          path: flashchat-${{ needs.bump-version-and-tag.outputs.version_name }}-windows-setup.exe
          if-no-files-found: error

      - name: Upload Windows portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: flashchat-${{ needs.bump-version-and-tag.outputs.version_name }}-windows-portable
          path: flashchat-${{ needs.bump-version-and-tag.outputs.version_name }}-windows.zip
          if-no-files-found: error

  publish-release:
    needs:
      - bump-version-and-tag
      - build-android-release
      - build-windows-release
    runs-on: ubuntu-latest

    steps:
      - name: Download Android release artifact
        uses: actions/download-artifact@v4
        with:
          name: flashchat-${{ needs.bump-version-and-tag.outputs.version_name }}-android-release
          path: release-assets

      - name: Download Windows installer artifact
        uses: actions/download-artifact@v4
        with:
          name: flashchat-${{ needs.bump-version-and-tag.outputs.version_name }}-windows-installer
          path: release-assets

      - name: Download Windows portable artifact
        uses: actions/download-artifact@v4
        with:
          name: flashchat-${{ needs.bump-version-and-tag.outputs.version_name }}-windows-portable
          path: release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump-version-and-tag.outputs.tag_name }}
          name: FlashChat ${{ needs.bump-version-and-tag.outputs.tag_name }}
          generate_release_notes: true
          files: |
            release-assets/flashchat-${{ needs.bump-version-and-tag.outputs.version_name }}-android-release.apk
            release-assets/flashchat-${{ needs.bump-version-and-tag.outputs.version_name }}-windows-setup.exe
            release-assets/flashchat-${{ needs.bump-version-and-tag.outputs.version_name }}-windows.zip
