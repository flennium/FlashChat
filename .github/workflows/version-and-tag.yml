name: Version And Tag

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump-version-and-tag:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump pubspec version
        id: bump
        shell: bash
        run: |
          python <<'PY'
          import re
          from pathlib import Path

          path = Path("pubspec.yaml")
          text = path.read_text(encoding="utf-8")
          match = re.search(r"^version:\s*([0-9]+)\.([0-9]+)\.([0-9]+)\+([0-9]+)\s*$", text, re.MULTILINE)
          if not match:
              raise SystemExit("Could not parse pubspec version")

          major, minor, patch, build = map(int, match.groups())
          patch += 1
          build += 1
          new_version = f"{major}.{minor}.{patch}+{build}"
          new_text = re.sub(
              r"^version:\s*[0-9]+\.[0-9]+\.[0-9]+\+[0-9]+\s*$",
              f"version: {new_version}",
              text,
              count=1,
              flags=re.MULTILINE,
          )
          path.write_text(new_text, encoding="utf-8")
          print(new_version)
          PY
          NEW_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          VERSION_NAME=${NEW_VERSION%%+*}
          TAG_NAME="v$VERSION_NAME"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        shell: bash
        run: |
          git add pubspec.yaml
          git commit -m "chore(release): bump version to ${{ steps.bump.outputs.new_version }}"

      - name: Create tag
        run: git tag "${{ steps.bump.outputs.tag_name }}"

      - name: Push commit and tag
        run: git push origin HEAD:main --follow-tags
